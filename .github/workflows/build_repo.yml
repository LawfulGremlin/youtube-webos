name: Update Homebrew Repository (manual recovery)

# Manual fallback for regenerating repo.json against the current
# latest release. release.yml handles repo.json automatically on
# every new release — only run this if a release was published
# without a matching repo.json update (e.g. someone created a
# release outside the normal workflow, or a release.yml run was
# interrupted before the repo.json step).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Resolve latest release tag
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          if [ -z "$TAG" ]; then
            echo "::error::No releases found"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest release: $TAG"

      - name: Download IPK from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.rel.outputs.tag }}" \
            --pattern 'youtube.leanback.v4_*_all.ipk' \
            --dir .

      - name: Generate repo.json
        env:
          REPO_NAME: ${{ github.repository }}
          TAG_NAME: ${{ steps.rel.outputs.tag }}
        run: node tools/gen-repo-json.cjs

      - name: Commit and push repo.json
        env:
          TAG_NAME: ${{ steps.rel.outputs.tag }}
        run: |
          set -e
          git config user.name  'GitHub Actions'
          git config user.email 'actions@github.com'
          git add repo.json
          if git diff --staged --quiet; then
            echo "repo.json already current for $TAG_NAME — nothing to commit."
            exit 0
          fi
          git commit -m "Update repo.json for ${TAG_NAME} release"
          git push origin main
