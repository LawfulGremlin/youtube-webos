name: Build & Test

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/**'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/**'
      - 'LICENSE'
      - 'docs/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube_adfree_ipk
          path: |
            ${{github.workspace}}/youtube.leanback.v4_*_all.ipk
