name: Build & Release

on:
  push:
    # Omitting branches: means this fires only on tag pushes, not branch pushes.
    tags:
      - 'v*.*'
      - '[0-9]*.*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run package
      - run: npm run manifest

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: 'Release ${{ github.ref_name }}'
          prerelease: true
          draft: false
          allowUpdates: true
          omitNameDuringUpdate: true
          omitBodyDuringUpdate: true
          omitDraftDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          artifacts: '*.ipk,*.manifest.json'
